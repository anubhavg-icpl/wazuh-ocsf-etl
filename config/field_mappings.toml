# ══════════════════════════════════════════════════════════════════════
#  Wazuh → OCSF → ClickHouse  —  Custom Field Mappings
# ══════════════════════════════════════════════════════════════════════
#
# This file is hot-reloaded every 10 seconds.  Edit in place and the
# pipeline picks up changes immediately — no restart required.
#
# ── OCSF schema version ───────────────────────────────────────────────
#
# Current stable release: OCSF 1.7.0
# Check https://github.com/ocsf/ocsf-schema/releases for newer versions.
# This string is written into every ClickHouse row — useful for filtering
# after a schema upgrade.

[meta]
# OCSF schema version this deployment targets.
ocsf_version = "1.7.0"

# ── OCSF class auto-detection (no config required) ────────────────────
#
# Every alert is automatically assigned the correct OCSF class_uid from
# rule.groups + decoder.name.  Reference table:
#
#  class_uid │ class_name              │ triggered by
#  ──────────┼─────────────────────────┼────────────────────────────────────
#  1001      │ File System Activity    │ syscheck / sysmon_file groups
#  1006      │ Process Activity        │ sysmon_process / execve / audit_command
#  2002      │ Vulnerability Finding   │ vulnerability-detector group
#  2003      │ Compliance Finding      │ sca / oscap / ciscat groups
#  2004      │ Detection Finding       │ DEFAULT — all other rules
#  3001      │ Account Change          │ adduser / userdel / usermod groups
#  3002      │ Authentication          │ sshd / pam / sudo / authentication*
#  4001      │ Network Activity        │ firewall / suricata / fortigate…
#  4002      │ HTTP Activity           │ nginx / apache / iis decoders; web* groups
#  4003      │ DNS Activity            │ named / dns decoder
#  4004      │ DHCP Activity           │ dhcpd decoder / dhcp group
#

# ── Custom decoder field mappings ─────────────────────────────────────
#
# Map fields from your own decoders to OCSF columns.
#
# Key:   field name as it appears in the Wazuh alert "data" object.
#        • Nested objects:   "win.eventdata.myField"   (navigated)
#        • Literal dot key:  "myapp.client_ip"          (exact match first)
#
# Value: target OCSF column name OR any custom name.
#
#   Standard targets (fill the typed ClickHouse column if still empty):
#     src_ip, dst_ip, src_port, dst_port
#     nat_src_ip, nat_dst_ip, nat_src_port, nat_dst_port
#     actor_user, target_user, domain
#     url, http_method, http_status
#     process_name, process_id, file_name
#     app_name, rule_name, category
#     action, status
#     interface_in, interface_out
#     src_hostname, dst_hostname
#     bytes_in, bytes_out
#     network_protocol
#
#   Unknown targets go into the `extensions` JSON column.
#
# ── Built-in defaults (common Wazuh sources) ──────────────────────────
#
# These are shipped as defaults because they fire on every standard
# Wazuh agent type.  They are all "fill-if-empty" — they never
# overwrite a value already set by the built-in field-path arrays.
#
# Standard targets  → go into typed ClickHouse columns.
# Unknown targets   → go into the `extensions` JSON column.

[field_mappings]

# ── Custom / site-specific decoder fields ─────────────────────────────────────
#
# Add entries HERE for fields your own decoders produce that are not already
# handled by the built-in extraction in transform.rs.
#
# Standard Wazuh modules are extracted natively — no config required:
#   • Vulnerability Detector : vulnerability.cve, .severity, .score.base, …
#   • Windows Event Log       : win.system.eventID / channel / processID, …
#                               win.eventdata.processName / logonType, …
#   • dpkg / apt audit        : package, version, arch, dpkg_status
#   • sudo / exec context     : uid, tty, pwd
#   • AWS CloudTrail          : aws.source_ip_address → src_ip
#                               aws.additionalEventData.UserName / aws.userIdentity.arn → actor_user
#                               aws.aws_account_id → domain
#                               aws.eventType → action  |  aws.eventCategory → app_category
#                               aws.responseElements.ConsoleLogin / serviceEventDetails.UserAuthentication → status
#                               aws.errorMessage → status=Failure + extensions.aws_error_message
#                               aws.tlsDetails.clientProvidedHostHeader → dst_hostname
#                               aws.additionalEventData.LoginTo → url
#                               + ~20 extension fields (aws_event_id, aws_region, aws_user_agent,
#                                 aws_identity_type, aws_mfa_used, tls_version, aws_resource_arn, …)
#   • Office 365 Audit Log    : office365.ClientIPAddress → src_ip
#                               office365.Actor[Type=5].ID → actor_user
#                               office365.Workload / ApplicationDisplayName → app_name
#                               office365.OrganizationId → domain
#                               office365.Operation → action
#                               office365.ResultStatus → status
#                               + ~25 extension fields (o365_app_id, o365_auth_type,
#                                 browser_name/version, o365_chat_name, o365_correlation_id, …)
#
# Examples (uncomment and adjust for your own decoders):
# "myapp.client_addr"        = "src_ip"
# "myapp.server_addr"        = "dst_ip"
# "myapp.current_user"       = "actor_user"
# "myapp.threat_name"        = "rule_name"
# "myapp.risk_score"         = "vendor_risk_score"
# "appcat"                   = "category"
# "pan.app"                  = "app_name"
# "crowdstrike.sha256"       = "process_sha256"


# ── OCSF schema migration (column renames) ────────────────────────────
#
# When upgrading to a new OCSF version that renames ClickHouse columns,
# add entries here.  At startup the binary will print the exact
# ALTER TABLE statements you need to run — but will NOT execute them
# automatically (to prevent accidental production disruptions).
#
# Format:  "old_column_name" = "new_column_name"
#
# Example (OCSF 1.x → 2.0 hypothetical rename):
# [ocsf_field_renames]
# "finding_title"  = "finding.title"
# "attack_id"      = "mitre_attack_id"

[ocsf_field_renames]
